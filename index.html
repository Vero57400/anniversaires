<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎂 Anniversaires</title>
<link href="https://fonts.googleapis.com/css2?family=Paytone+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #FF6B6B; --c2: #FFD93D; --c3: #6BCB77; --c4: #4D96FF; --c5: #FF6FC8;
    --bg: #0d0d1a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
    color: #fff;
  }

  /* === CONFETTI CANVAS === */
  #confetti-canvas {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }

  /* === LAYOUT === */
  #app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

  /* === ADMIN PANEL === */
  #admin-toggle {
    position: fixed; top: 14px; right: 14px; z-index: 100;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700;
    padding: 7px 14px; border-radius: 20px; cursor: pointer;
    backdrop-filter: blur(8px); transition: background .2s;
  }
  #admin-toggle:hover { background: rgba(255,255,255,0.2); }

  #admin-panel {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
    align-items: center; justify-content: center;
  }
  #admin-panel.open { display: flex; }

  .admin-box {
    background: #1a1a2e; border-radius: 20px; padding: 32px;
    width: min(680px, 95vw); max-height: 90vh; overflow-y: auto;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .admin-box h2 {
    font-family: 'Paytone One', sans-serif;
    font-size: 22px; margin-bottom: 24px; color: var(--c2);
    display: flex; align-items: center; gap: 10px;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px; margin-bottom: 12px; }
  .form-row input {
    background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
    color: #fff; font-family: 'Nunito', sans-serif; font-size: 15px;
    padding: 10px 14px; border-radius: 10px; outline: none; transition: border .2s;
  }
  .form-row input:focus { border-color: var(--c4); }
  .form-row input::placeholder { color: rgba(255,255,255,0.3); }
  .btn-add {
    background: var(--c3); color: #0d0d1a; border: none; border-radius: 10px;
    font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 800;
    padding: 0 18px; cursor: pointer; transition: transform .15s;
  }
  .btn-add:hover { transform: scale(1.1); }

  .collab-list { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; }
  .collab-item {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.05); border-radius: 10px; padding: 10px 16px;
    font-size: 15px;
  }
  .collab-item .name { font-weight: 700; }
  .collab-item .date { color: rgba(255,255,255,0.5); font-size: 13px; margin-left: 10px; }
  .btn-del {
    background: var(--c1); color: #fff; border: none; border-radius: 8px;
    padding: 4px 12px; cursor: pointer; font-size: 13px; font-weight: 700;
    transition: opacity .2s;
  }
  .btn-del:hover { opacity: .8; }

  .admin-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  .btn-close {
    background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px; padding: 10px 24px; font-family: 'Nunito', sans-serif;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: background .2s;
  }
  .btn-close:hover { background: rgba(255,255,255,0.2); }

  /* === DISPLAY SCREEN === */
  #display {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 40px 24px; text-align: center; min-height: 100vh;
  }

  /* Date header */
  .date-header {
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: clamp(14px, 2vw, 20px);
    text-transform: uppercase; letter-spacing: .2em;
    color: rgba(255,255,255,0.45); margin-bottom: 16px;
  }

  /* === BIRTHDAY STATE === */
  .title-bday {
    font-family: 'Paytone One', sans-serif;
    font-size: clamp(38px, 7vw, 90px);
    line-height: 1.05;
    background: linear-gradient(135deg, var(--c2) 0%, var(--c1) 40%, var(--c5) 80%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .subtitle { font-size: clamp(14px, 2vw, 22px); color: rgba(255,255,255,0.55); margin-bottom: 50px; }

  /* Cards */
  .cards { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; margin-bottom: 50px; }
  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px; padding: 32px 40px;
    min-width: 220px; max-width: 280px;
    backdrop-filter: blur(10px);
    animation: cardIn .6s ease both;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--col1, #FF6B6B33), var(--col2, #FFD93D33));
    border-radius: inherit;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(30px) scale(.95); }
    to   { opacity: 1; transform: none; }
  }
  .card-emoji { font-size: 56px; display: block; margin-bottom: 14px; }
  .card-cake-svg { width: 110px; height: auto; display: block; margin: 0 auto 14px; filter: drop-shadow(0 0 12px rgba(255,180,50,0.3)); animation: cakeFloat 4s ease-in-out infinite; }
  .card-name {
    font-family: 'Paytone One', sans-serif;
    font-size: clamp(22px, 3vw, 32px);
    color: #fff; line-height: 1.1;
    position: relative;
  }
  .card-age {
    margin-top: 8px; font-size: 14px; font-weight: 700;
    color: rgba(255,255,255,0.5); position: relative;
  }

  /* === EMPTY STATE === */
  .no-bday {
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }
  .no-bday .cake-svg {
    width: clamp(180px, 28vw, 340px);
    height: auto;
    filter: drop-shadow(0 0 40px rgba(255,180,50,0.25));
    animation: cakeFloat 4s ease-in-out infinite;
  }
  @keyframes cakeFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-14px); }
  }
  .no-bday h2 {
    font-family: 'Paytone One', sans-serif;
    font-size: clamp(22px, 3.5vw, 48px);
    color: rgba(255,255,255,0.75);
    line-height: 1.15;
  }


  /* Next birthday hint */
  .next-hint {
    margin-top: 32px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 16px 28px;
    font-size: clamp(13px, 1.5vw, 18px);
    color: rgba(255,255,255,0.5);
  }
  .next-hint strong { color: var(--c2); }

  /* Decorative circles */
  .bg-blob {
    position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
    animation: blobMove 12s ease-in-out infinite alternate;
  }
  @keyframes blobMove {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(30px, -20px) scale(1.08); }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- Background blobs -->
<div class="bg-blob" style="width:500px;height:500px;background:#FF6B6B22;top:-100px;left:-100px;animation-delay:0s"></div>
<div class="bg-blob" style="width:400px;height:400px;background:#4D96FF22;bottom:-80px;right:-80px;animation-delay:-5s"></div>
<div class="bg-blob" style="width:300px;height:300px;background:#FFD93D22;top:40%;left:40%;animation-delay:-3s"></div>

<button id="admin-toggle">⚙️ Gérer les collaborateurs</button>

<!-- ADMIN PANEL -->
<div id="admin-panel">
  <div class="admin-box">
    <h2>🎂 Gestion des collaborateurs</h2>
    <div class="form-row">
      <input id="inp-name" type="text" placeholder="Prénom Nom" />
      <input id="inp-date" type="date" />
      <button class="btn-add" onclick="addCollab()" title="Ajouter">+</button>
    </div>
    <div class="collab-list" id="collab-list"></div>
    <div class="admin-footer">
      <button class="btn-close" onclick="closeAdmin()">✓ Fermer</button>
    </div>
  </div>
</div>

<!-- DISPLAY -->
<div id="app">
  <div id="display"></div>
</div>

<script>
// ── DATA ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'bday_collabs_v1';

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

let collabs = load();

// ── HELPERS ─────────────────────────────────────────────────────────────────
function todayMD() {
  const d = new Date();
  return { m: d.getMonth()+1, d: d.getDate() };
}

function parseDOB(str) {
  // str = "YYYY-MM-DD"
  const [y,m,d] = str.split('-').map(Number);
  return { year: y, month: m, day: d };
}

function isBirthdayToday(dob) {
  const t = todayMD();
  const b = parseDOB(dob);
  return b.month === t.m && b.day === t.d;
}

function calcAge(dob) {
  const b = parseDOB(dob);
  const now = new Date();
  let age = now.getFullYear() - b.year;
  const passé = now.getMonth()+1 > b.month || (now.getMonth()+1 === b.month && now.getDate() >= b.day);
  if (!passé) age--;
  return age;
}

function daysUntilBirthday(dob) {
  const b = parseDOB(dob);
  const now = new Date(); now.setHours(0,0,0,0);
  const next = new Date(now.getFullYear(), b.month-1, b.day);
  if (next < now) next.setFullYear(now.getFullYear()+1);
  return Math.round((next - now) / 86400000);
}

  <rect x="85" y="82" width="150" height="10" rx="5" fill="#9b59b6"/>
  <path d="M85 82 Q97 73 109 82 Q121 73 133 82 Q145 73 157 82 Q169 73 181 82 Q193 73 205 82 Q217 73 229 82 Q235 78 235 82" fill="#fff5e6" opacity="0.95"/>
  <rect x="80" y="195" width="10" height="4" rx="2" fill="#FFD93D" transform="rotate(30,85,197)"/>
  <rect x="120" y="200" width="10" height="4" rx="2" fill="#6BCB77" transform="rotate(-20,125,202)"/>
  <rect x="165" y="193" width="10" height="4" rx="2" fill="#4D96FF" transform="rotate(45,170,195)"/>
  <rect x="205" y="199" width="10" height="4" rx="2" fill="#FF6FC8" transform="rotate(-35,210,201)"/>
  <rect x="240" y="194" width="8" height="4" rx="2" fill="#FF6B6B" transform="rotate(15,244,196)"/>

  <ellipse cx="210" cy="46" rx="3" ry="5" fill="#FF6B6B" opacity="0.7"/>
</svg>`;

const EMOJIS = ['🎉','🎊','🥳','🌟','✨','🎈','🎁'];
const CARD_COLORS = [
  ['#FF6B6B','#FFD93D'], ['#4D96FF','#6BCB77'], ['#FF6FC8','#FFD93D'],
  ['#6BCB77','#4D96FF'], ['#FFD93D','#FF6B6B'], ['#a29bfe','#fd79a8']
];

function formatDate(str) {
  const b = parseDOB(str);
  const months = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
  return `${b.day} ${months[b.month-1]}`;
}

function formatFullDate() {
  return new Date().toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

// ── RENDER DISPLAY ───────────────────────────────────────────────────────────
function renderDisplay() {
  const display = document.getElementById('display');
  const today = collabs.filter(c => isBirthdayToday(c.dob));

  const cap = s => s.charAt(0).toUpperCase() + s.slice(1);

  if (today.length > 0) {
    startConfetti();
    const cards = today.map((c, i) => {
      const cols = CARD_COLORS[i % CARD_COLORS.length];
      const age = calcAge(c.dob);
      return `
        <div class="card" style="--col1:${cols[0]}55;--col2:${cols[1]}55;animation-delay:${i*0.15}s">
          ${CAKE_SVG}
          <div class="card-name">${c.name}</div>
          <div class="card-age">${age} ans aujourd'hui 🎂</div>
        </div>`;
    }).join('');

    const msg = today.length === 1
      ? `Toute l'équipe lui souhaite un joyeux anniversaire !`
      : `Toute l'équipe leur souhaite un joyeux anniversaire !`;

    display.innerHTML = `
      <div class="date-header">${cap(formatFullDate())}</div>
      <div class="title-bday">🎉 Joyeux<br>Anniversaire !</div>
      <div class="subtitle">${msg}</div>
      <div class="cards">${cards}</div>
    `;
  } else {
    stopConfetti();

    // Find next birthday
    const upcoming = collabs
      .map(c => ({ ...c, days: daysUntilBirthday(c.dob) }))
      .filter(c => c.days > 0)
      .sort((a,b) => a.days - b.days);

    let nextHtml = '';
    if (upcoming.length > 0) {
      const n = upcoming[0];
      nextHtml = `
        <div class="next-hint">
          Prochain anniversaire : <strong>${n.name}</strong> dans <strong>${n.days} jour${n.days>1?'s':''}</strong>
          (le ${formatDate(n.dob)})
        </div>`;
    }

    display.innerHTML = `
      <div class="date-header">${cap(formatFullDate())}</div>
      <div class="no-bday">
        <svg class="cake-svg" viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg">

          <ellipse cx="160" cy="248" rx="130" ry="18" fill="#1a1040" opacity="0.5"/>

          <rect x="50" y="180" width="220" height="12" rx="6" fill="#e74c3c"/>
          <!-- Frosting drips bottom layer -->

          <path d="M65 128 Q78 118 91 128 Q104 118 117 128 Q130 118 143 128 Q156 118 169 128 Q182 118 195 128 Q208 118 221 128 Q234 118 247 128 Q255 123 255 128" fill="#fff5e6" opacity="0.95"/>

          <rect x="85" y="82" width="150" height="10" rx="5" fill="#9b59b6"/>
          <!-- Frosting drips top layer -->
          <path d="M85 82 Q97 73 109 82 Q121 73 133 82 Q145 73 157 82 Q169 73 181 82 Q193 73 205 82 Q217 73 229 82 Q235 78 235 82" fill="#fff5e6" opacity="0.95"/>
          <!-- Sprinkles on base -->
          <rect x="80"  y="195" width="10" height="4" rx="2" fill="#FFD93D" transform="rotate(30,85,197)"/>
          <rect x="120" y="200" width="10" height="4" rx="2" fill="#6BCB77" transform="rotate(-20,125,202)"/>
          <rect x="165" y="193" width="10" height="4" rx="2" fill="#4D96FF" transform="rotate(45,170,195)"/>
          <rect x="205" y="199" width="10" height="4" rx="2" fill="#FF6FC8" transform="rotate(-35,210,201)"/>
          <rect x="240" y="194" width="8"  height="4" rx="2" fill="#FF6B6B" transform="rotate(15,244,196)"/>
          <!-- Sprinkles on middle -->
          <rect x="90"  y="144" width="9" height="4" rx="2" fill="#FF6B6B" transform="rotate(40,94,146)"/>
          <rect x="135" y="148" width="9" height="4" rx="2" fill="#FFD93D" transform="rotate(-25,139,150)"/>
          <rect x="180" y="143" width="9" height="4" rx="2" fill="#4D96FF" transform="rotate(55,184,145)"/>
          <rect x="220" y="149" width="9" height="4" rx="2" fill="#6BCB77" transform="rotate(-10,224,151)"/>
          <!-- Stars on top tier -->

          <!-- Candles -->
          <rect x="105" y="52" width="10" height="34" rx="5" fill="#FF6B6B"/>
          <rect x="130" y="46" width="10" height="40" rx="5" fill="#FFD93D"/>
          <rect x="155" y="50" width="10" height="36" rx="5" fill="#6BCB77"/>
          <rect x="180" y="44" width="10" height="42" rx="5" fill="#4D96FF"/>
          <rect x="205" y="52" width="10" height="34" rx="5" fill="#FF6FC8"/>
          <!-- Flames -->
          <ellipse cx="110" cy="48" rx="5" ry="8" fill="#FFD93D" opacity="0.9">
            <animate attributeName="ry" values="8;10;7;9;8" dur="1.1s" repeatCount="indefinite"/>
            <animate attributeName="cy" values="48;46;49;47;48" dur="1.1s" repeatCount="indefinite"/>
          </ellipse>
          <ellipse cx="110" cy="46" rx="3" ry="5" fill="#FF6B6B" opacity="0.7">
            <animate attributeName="ry" values="5;7;4;6;5" dur="1.1s" repeatCount="indefinite"/>

// ── ADMIN ────────────────────────────────────────────────────────────────────
function renderAdminList() {
  const list = document.getElementById('collab-list');
  if (collabs.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:rgba(255,255,255,0.3);padding:20px">Aucun collaborateur ajouté</div>';
    return;
  }
  const sorted = [...collabs].sort((a,b) => a.name.localeCompare(b.name));
  list.innerHTML = sorted.map((c,i) => `
    <div class="collab-item">
      <span>
        <span class="name">${c.name}</span>
        <span class="date">— né(e) le ${formatDate(c.dob)}</span>
      </span>
      <button class="btn-del" onclick="deleteCollab('${c.id}')">Supprimer</button>
    </div>
  `).join('');
}

function addCollab() {
  const name = document.getElementById('inp-name').value.trim();
  const dob  = document.getElementById('inp-date').value;
  if (!name || !dob) return;
  collabs.push({ id: Date.now().toString(), name, dob });
  save(collabs);
  document.getElementById('inp-name').value = '';
  document.getElementById('inp-date').value = '';
  renderAdminList();
  renderDisplay();
}

function deleteCollab(id) {
  collabs = collabs.filter(c => c.id !== id);
  save(collabs);
  renderAdminList();
  renderDisplay();
}

document.getElementById('admin-toggle').addEventListener('click', () => {
  document.getElementById('admin-panel').classList.add('open');
  renderAdminList();
});

function closeAdmin() {
  document.getElementById('admin-panel').classList.remove('open');
}

document.getElementById('admin-panel').addEventListener('click', e => {
  if (e.target === document.getElementById('admin-panel')) closeAdmin();
});

document.getElementById('inp-name').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inp-date').focus(); });
document.getElementById('inp-date').addEventListener('keydown', e => { if(e.key==='Enter') addCollab(); });

// ── CONFETTI ─────────────────────────────────────────────────────────────────
const canvas = document.getElementById('confetti-canvas');
const ctx = canvas.getContext('2d');
let particles = [], animId = null, running = false;

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.addEventListener('resize', resize); resize();

const COLORS = ['#FF6B6B','#FFD93D','#6BCB77','#4D96FF','#FF6FC8','#fff','#a29bfe'];

function mkParticle() {
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    w: 8 + Math.random() * 10,
    h: 4 + Math.random() * 6,
    color: COLORS[Math.floor(Math.random()*COLORS.length)],
    vx: (Math.random()-.5)*2,
    vy: 2 + Math.random()*3,
    rot: Math.random()*360,
    drot: (Math.random()-.5)*4,
    opacity: .8 + Math.random()*.2,
  };
}

function stepConfetti() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy; p.rot += p.drot;
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI/180);
    ctx.globalAlpha = p.opacity;
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
    if (p.y > canvas.height + 20) {
      p.x = Math.random()*canvas.width; p.y = -20;
    }
  }
  animId = requestAnimationFrame(stepConfetti);
}

function startConfetti() {
  if (running) return;
  running = true;
  particles = Array.from({length: 120}, mkParticle);
  stepConfetti();
}

function stopConfetti() {
  if (!running) return;
  running = false;
  if (animId) cancelAnimationFrame(animId);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles = [];
}

// ── INIT ─────────────────────────────────────────────────────────────────────
renderDisplay();

// Refresh automatiquement à minuit
function scheduleRefresh() {
  const now = new Date();
  const ms = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1) - now;
  setTimeout(() => { renderDisplay(); scheduleRefresh(); }, ms);
}
scheduleRefresh();
</script>
